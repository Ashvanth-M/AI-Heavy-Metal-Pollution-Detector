services:
  - type: web
    name: aquametrix
    runtime: node
    rootDir: project/project/project/extraction/extraction
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADAFRUIT_IO_KEY
        sync: false
      - key: AIO_USERNAME
        sync: false
    healthCheckPath: /api/health
